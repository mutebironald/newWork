<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Payment and Revenue Evidence Flow">
  <rect width="1400" height="900" fill="#F7F3EA"/>
  <text x="700" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#11263C">Payment and Revenue Evidence Flow</text>
  <text x="700" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616E">Separate gross service payments, agent payouts, and platform revenue</text>
  <rect x="90" y="210" width="230" height="125" rx="16" fill="#FFFFFF" stroke="#C7BDAF" stroke-width="2"/>
  <text x="205.0" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">Merchant Payment</text>
  <text x="205.0" y="274" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Cash, Stripe, or</text>
  <text x="205.0" y="296" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">mobile money in phase two</text>
  <rect x="410" y="210" width="230" height="125" rx="16" fill="#E6DED1" stroke="#C7BDAF" stroke-width="2"/>
  <text x="525.0" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">Payment Record</text>
  <text x="525.0" y="274" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Gross amount</text>
  <text x="525.0" y="296" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Method</text>
  <text x="525.0" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Timestamp</text>
  <rect x="730" y="150" width="230" height="125" rx="16" fill="#496B5B" stroke="#C7BDAF" stroke-width="2"/>
  <text x="845.0" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">Agent Payout</text>
  <text x="845.0" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Recommended 85%</text>
  <text x="845.0" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Recorded or paid out</text>
  <rect x="730" y="330" width="230" height="125" rx="16" fill="#6C91A8" stroke="#C7BDAF" stroke-width="2"/>
  <text x="845.0" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">NewWork Revenue</text>
  <text x="845.0" y="394" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Recommended 15%</text>
  <text x="845.0" y="416" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Platform ledger</text>
  <rect x="1050" y="240" width="240" height="155" rx="16" fill="#FFFFFF" stroke="#C7BDAF" stroke-width="2"/>
  <text x="1170.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">Evidence Dashboard</text>
  <text x="1170.0" y="304" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Revenue</text>
  <text x="1170.0" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Payouts</text>
  <text x="1170.0" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Paid work episodes</text>
  <text x="1170.0" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Proof status</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#11263C"/></marker></defs>
  <line x1="320" y1="272" x2="410" y2="272" stroke="#11263C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#11263C"/></marker></defs>
  <line x1="640" y1="272" x2="730" y2="212" stroke="#11263C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#11263C"/></marker></defs>
  <line x1="640" y1="272" x2="730" y2="392" stroke="#11263C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#11263C"/></marker></defs>
  <line x1="960" y1="212" x2="1050" y2="290" stroke="#11263C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#11263C"/></marker></defs>
  <line x1="960" y1="392" x2="1050" y2="335" stroke="#11263C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="250" y="590" width="900" height="105" rx="16" fill="#E6DED1" stroke="#C7BDAF" stroke-width="2"/>
  <text x="700.0" y="625" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1F2933">Rule: Do not mix user wages with platform revenue</text>
  <text x="700.0" y="654" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616E">Judges need clear evidence of real software revenue and real work income created for agents.</text>
</svg>